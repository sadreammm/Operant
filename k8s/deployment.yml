apiVersion: apps/v1
kind: Deployment
metadata:
  name: operant-backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: operant-backend
  template:
    metadata:
      labels:
        app: operant-backend
    spec:
      containers:
        - name: operant-backend
          image: gcr.io/dependable-glow-466816-m4/operant-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: operant-secrets
                  key: OAUTH_CLIENT_ID
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: operant-secrets
                  key: OAUTH_CLIENT_SECRET
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: operant-secrets
                  key: GEMINI_API_KEY
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: operant-secrets
                  key: DB_URL
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: operant-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: operant-secrets
                  key: DB_PASSWORD
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: operant-secrets
                  key: SMTP_USER
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: operant-secrets
                  key: SMTP_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"